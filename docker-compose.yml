services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mediamind
      POSTGRES_USER: mediamind
      POSTGRES_PASSWORD: mediamind
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediamind -d mediamind"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://mediamind:mediamind@db:5432/mediamind
      STORAGE_DIR: /app/data
      AI_PROVIDER: ${AI_PROVIDER:-auto}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4.1-mini}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-whisper-1}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      REDIS_URL: redis://redis:6379/0
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-dev-secret-change-me}
      CORS_ORIGINS: http://localhost:8000,http://127.0.0.1:8000,http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      - api
    ports:
      - "8000:80"

volumes:
  postgres_data:
